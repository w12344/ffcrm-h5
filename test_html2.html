<!DOCTYPE html>
<html>
<head>
<style>
  .wrapper { width: 500px; overflow: auto; border: 1px solid red; }
  table { width: max-content; min-width: 100%; table-layout: fixed; border-collapse: collapse; }
  td { border: 1px solid black; overflow: hidden; white-space: nowrap; }
  .wrap { white-space: normal; word-wrap: break-word; }
</style>
</head>
<body>
<div class="wrapper">
  <table>
    <colgroup>
      <col style="width: 200px;">
      <col style="width: 200px;">
      <col style="width: 200px;">
    </colgroup>
    <tr><td class="wrap">long long long long long text</td><td class="wrap">long long long text</td><td class="wrap">long long long text</td></tr>
    <tr><td>123</td><td>123</td><td>123</td></tr>
  </table>
</div>
</body>
</html>
